<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralCut AI — Agente Analista</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --card: #1a1a23; --border: #2a2a38;
    --orange: #FF5C1A; --text: #f0f0f0; --muted: #888;
    --green: #2ecc71; --blue: #3498db; --user-bg: #1e2a3a;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
         height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { padding: 14px 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .header-logo { width: 36px; height: 36px; background: var(--orange);
                 border-radius: 10px; display: flex; align-items: center;
                 justify-content: center; font-size: 18px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 20px;
           background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar — Contexto */
  .sidebar { width: 280px; border-right: 1px solid var(--border);
             display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: .1em;
                   text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .context-item { background: var(--bg); border: 1px solid var(--border);
                  border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
                  cursor: pointer; transition: border-color .15s; position: relative; }
  .context-item:hover { border-color: var(--orange); }
  .context-item.active { border-color: var(--orange); background: rgba(255,92,26,0.05); }
  .context-item .ci-title { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
  .context-item .ci-sub { font-size: 10px; color: var(--muted); }
  .context-item .ci-del { position: absolute; top: 8px; right: 8px;
                          font-size: 14px; color: var(--muted); cursor: pointer;
                          opacity: 0; transition: opacity .15s; }
  .context-item:hover .ci-del { opacity: 1; }
  .btn-add-context { width: 100%; padding: 8px; border-radius: 8px;
                     border: 1px dashed var(--border); background: transparent;
                     color: var(--muted); font-size: 12px; cursor: pointer;
                     transition: all .15s; }
  .btn-add-context:hover { border-color: var(--orange); color: var(--orange); }

  /* Presets rápidos */
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .preset-btn { padding: 7px 6px; border-radius: 8px; border: 1px solid var(--border);
                background: transparent; color: var(--text); font-size: 10px;
                cursor: pointer; text-align: center; transition: all .15s; }
  .preset-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* Chat */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex;
              flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; max-width: 85%; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
                display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg.assistant .msg-avatar { background: rgba(255,92,26,0.2); }
  .msg.user .msg-avatar { background: var(--user-bg); }
  .msg-bubble { padding: 12px 16px; border-radius: 14px; font-size: 13px;
                line-height: 1.6; max-width: 100%; }
  .msg.assistant .msg-bubble { background: var(--card); border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: var(--user-bg); border: 1px solid #2a3a4a; }
  .msg-bubble pre { background: var(--bg); border-radius: 8px; padding: 10px 12px;
                    font-size: 11px; overflow-x: auto; margin-top: 8px;
                    border: 1px solid var(--border); white-space: pre-wrap; }
  .msg-bubble strong { color: var(--orange); }
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%;
                 animation: bounce .9s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* Input */
  .input-area { padding: 14px 16px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-box { flex: 1; background: var(--card); border: 1px solid var(--border);
               border-radius: 12px; padding: 10px 14px; color: var(--text);
               font-size: 13px; resize: none; outline: none; min-height: 44px;
               max-height: 150px; font-family: inherit; transition: border-color .15s; }
  .input-box:focus { border-color: var(--orange); }
  .btn-send { width: 44px; height: 44px; border-radius: 12px; background: var(--orange);
              border: none; color: #fff; font-size: 18px; cursor: pointer;
              display: flex; align-items: center; justify-content: center;
              transition: opacity .15s; flex-shrink: 0; }
  .btn-send:disabled { opacity: .4; cursor: default; }
  .input-hint { font-size: 10px; color: var(--muted); margin-top: 6px; }

  /* Modal contexto */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
                   display: flex; align-items: center; justify-content: center;
                   z-index: 100; display: none; }
  .modal { background: var(--card); border: 1px solid var(--border);
           border-radius: 16px; padding: 24px; width: 480px; max-width: 95vw; }
  .modal h3 { font-size: 16px; margin-bottom: 16px; }
  .modal input, .modal textarea { width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-size: 13px; margin-bottom: 12px; outline: none;
    font-family: inherit; }
  .modal textarea { min-height: 120px; resize: vertical; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-primary { padding: 8px 20px; border-radius: 8px; background: var(--orange);
                 border: none; color: #fff; font-size: 13px; cursor: pointer; }
  .btn-secondary { padding: 8px 20px; border-radius: 8px; background: transparent;
                   border: 1px solid var(--border); color: var(--muted);
                   font-size: 13px; cursor: pointer; }
  a.back-link { color: var(--muted); font-size: 12px; text-decoration: none;
                display: flex; align-items: center; gap: 4px; }
  a.back-link:hover { color: var(--text); }
  .scrollbar-thin::-webkit-scrollbar { width: 4px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🤖</div>
  <div>
    <div class="header-title">ViralCut AI — Agente Analista</div>
    <div class="header-sub">Especialista em conteúdo viral para redes sociais</div>
  </div>
  <div class="header-right">
    <span class="badge">● Online</span>
    <a href="/" class="back-link">← App</a>
  </div>
</div>

<div class="main">
  <!-- Sidebar contexto -->
  <div class="sidebar">
    <div class="sidebar-section" style="flex:1;overflow-y:auto;" id="context-list-section">
      <div class="sidebar-title">📎 Contexto do Agente</div>
      <div id="context-list"></div>
      <button class="btn-add-context" onclick="openContextModal()">+ Adicionar contexto</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">⚡ Perguntas rápidas</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="sendPreset('Quais tipos de conteúdo têm mais potencial viral agora?')">🔥 Tendências</button>
        <button class="preset-btn" onclick="sendPreset('Como identificar o gancho perfeito nos primeiros 3 segundos?')">🎯 Gancho</button>
        <button class="preset-btn" onclick="sendPreset('Quais critérios você usa para dar score alto a um clipe?')">📊 Scoring</button>
        <button class="preset-btn" onclick="sendPreset('Como melhorar a seleção de clipes para o meu nicho?')">🎯 Nicho</button>
        <button class="preset-btn" onclick="sendPreset('Explique como você analisa a estrutura emocional de um vídeo')">🧠 Análise</button>
        <button class="preset-btn" onclick="sendPreset('Quais erros comuns fazem um clipe não performar bem?')">⚠️ Erros</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">🗑️ Sessão</div>
      <button class="btn-add-context" onclick="clearChat()" style="color:#e74c3c;border-color:#e74c3c33;">
        Limpar conversa
      </button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages scrollbar-thin" id="messages"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="input-box" id="user-input" placeholder="Fale com o agente... (Enter para enviar, Shift+Enter para nova linha)"
                  onkeydown="handleKey(event)" rows="1" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">➤</button>
      </div>
      <div class="input-hint">O agente usa o contexto da barra lateral em todas as análises de vídeo</div>
    </div>
  </div>
</div>

<!-- Modal adicionar contexto -->
<div class="modal-overlay" id="context-modal">
  <div class="modal">
    <h3>📎 Adicionar Contexto</h3>
    <input type="text" id="ctx-title" placeholder="Título (ex: Meu nicho, Público-alvo, Canal)" />
    <textarea id="ctx-content" placeholder="Descreva o contexto...&#10;Ex: Meu canal é sobre empreendedorismo para jovens de 18-30 anos. O público valoriza autenticidade e praticidade. Os vídeos que mais performam são histórias pessoais com lição no final."></textarea>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeContextModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveContext()">Salvar</button>
    </div>
  </div>
</div>

<script>
const SYSTEM_CONTEXT_KEY = 'viralcut_agent_context';
const CHAT_HISTORY_KEY   = 'viralcut_chat_history';

let conversationHistory = [];
let agentContext = [];
let isLoading = false;

// ── Contexto ──────────────────────────────────────────────────
function loadContext() {
  try {
    agentContext = JSON.parse(localStorage.getItem(SYSTEM_CONTEXT_KEY) || '[]');
  } catch { agentContext = []; }
  renderContextList();
}

function saveContextToStorage() {
  localStorage.setItem(SYSTEM_CONTEXT_KEY, JSON.stringify(agentContext));
}

function renderContextList() {
  const el = document.getElementById('context-list');
  if (!agentContext.length) {
    el.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:8px 0;">Nenhum contexto adicionado ainda</div>';
    return;
  }
  el.innerHTML = agentContext.map((c, i) => `
    <div class="context-item">
      <span class="ci-del" onclick="deleteContext(${i})">✕</span>
      <div class="ci-title">${c.title}</div>
      <div class="ci-sub">${c.content.substring(0,80)}...</div>
    </div>`).join('');
}

function openContextModal() {
  document.getElementById('ctx-title').value = '';
  document.getElementById('ctx-content').value = '';
  document.getElementById('context-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('ctx-title').focus(), 100);
}

function closeContextModal() {
  document.getElementById('context-modal').style.display = 'none';
}

function saveContext() {
  const title   = document.getElementById('ctx-title').value.trim();
  const content = document.getElementById('ctx-content').value.trim();
  if (!title || !content) return;
  agentContext.push({ title, content, ts: Date.now() });
  saveContextToStorage();
  renderContextList();
  closeContextModal();
  addMessage('assistant', `✅ Contexto **"${title}"** salvo! Vou usar essa informação em todas as próximas análises de vídeo e nas nossas conversas.`);
}

function deleteContext(i) {
  agentContext.splice(i, 1);
  saveContextToStorage();
  renderContextList();
}

function buildSystemPrompt() {
  let base = `Você é o ViralCut AI, um agente especialista em identificar momentos virais em vídeos para redes sociais brasileiras.

Você analisa transcrições de podcasts, entrevistas e conteúdo educacional para encontrar os trechos com maior potencial de engajamento no TikTok, Reels e YouTube Shorts.

Seu conhecimento inclui: psicologia da atenção, storytelling, estrutura narrativa, ganchos virais, tendências de conteúdo digital no Brasil.`;

  if (agentContext.length) {
    base += '\n\n## CONTEXTO FORNECIDO PELO USUÁRIO:\n';
    agentContext.forEach(c => {
      base += `\n### ${c.title}:\n${c.content}\n`;
    });
  }
  return base;
}

// ── Chat ──────────────────────────────────────────────────────
function addMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'assistant' ? '🤖' : '👤';
  const formatted = content
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/\n/g, '<br>');

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatted}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing-indicator')?.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('btn-send').disabled = true;
  showTyping();

  try {
    const resp = await fetch('/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: conversationHistory,
        system:   buildSystemPrompt(),
      })
    });

    const data = await resp.json();
    removeTyping();

    if (data.error) {
      addMessage('assistant', `❌ Erro: ${data.error}`);
    } else {
      const reply = data.content;
      addMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
      saveChat();
    }
  } catch(e) {
    removeTyping();
    addMessage('assistant', '❌ Erro de conexão. Verifique se o servidor está online.');
  }

  isLoading = false;
  document.getElementById('btn-send').disabled = false;
  input.focus();
}

function sendPreset(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(150, el.scrollHeight) + 'px';
}

function clearChat() {
  if (!confirm('Limpar toda a conversa?')) return;
  conversationHistory = [];
  localStorage.removeItem(CHAT_HISTORY_KEY);
  document.getElementById('messages').innerHTML = '';
  showWelcome();
}

function saveChat() {
  try {
    localStorage.setItem(CHAT_HISTORY_KEY,
      JSON.stringify(conversationHistory.slice(-40)));
  } catch {}
}

function loadChat() {
  try {
    const saved = JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY) || '[]');
    if (saved.length) {
      conversationHistory = saved;
      saved.forEach(m => addMessage(m.role, m.content));
      return true;
    }
  } catch {}
  return false;
}

function showWelcome() {
  addMessage('assistant', `Olá! Sou o **ViralCut AI**, seu agente analista de conteúdo viral. 🎯

Posso te ajudar com:
- **Estratégia de conteúdo** para o seu nicho
- **Análise de ganchos** e como prender atenção nos primeiros 3 segundos
- **Critérios de scoring** que uso para avaliar clipes
- **Tendências** de conteúdo no TikTok, Reels e Shorts

Adicione contexto sobre o seu canal na barra lateral para que eu personalize as análises para você. 

Como posso te ajudar?`);
}

// ── Init ──────────────────────────────────────────────────────
loadContext();
if (!loadChat()) showWelcome();
</script>
</body>
</html>
