<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoClipAI — Gerador de Clipes Virais</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg: #07090F;
    --surface: #0F1219;
    --border: rgba(255,255,255,0.07);
    --cyan: #00E5FF;
    --purple: #B388FF;
    --green: #69FF9C;
    --orange: #FF9F40;
    --red: #FF6D6D;
    --text: #E8EAF6;
    --muted: rgba(255,255,255,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 20% 10%, rgba(0,229,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(179,136,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header {
    padding: 40px 24px 32px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    position: relative;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .logo-text {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.03em;
  }

  /* Main form card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin: 32px 0 20px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .url-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
  }

  input[type="text"], input[type="number"], select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: rgba(0,229,255,0.4);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), #0099BB);
    border: none;
    border-radius: 10px;
    color: #06080F;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 12px 28px;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-top: 4px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
  }

  input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--cyan);
    cursor: pointer;
  }

  .checkbox-row label {
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }

  /* Progress */
  #progress-area {
    display: none;
    margin: 20px 0;
  }

  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .progress-msg {
    font-size: 14px;
    color: var(--text);
  }

  .progress-pct {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--cyan);
    font-weight: 500;
  }

  .progress-bar-bg {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .stage-dots {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .stage-dot {
    font-size: 11px;
    color: var(--muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 20px;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .stage-dot.active {
    color: var(--cyan);
    border-color: rgba(0,229,255,0.3);
    background: rgba(0,229,255,0.06);
  }

  .stage-dot.done {
    color: var(--green);
    border-color: rgba(105,255,156,0.3);
    background: rgba(105,255,156,0.06);
  }

  /* Results */
  #results-area { display: none; }

  .results-header {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .clips-grid {
    display: grid;
    gap: 14px;
  }

  .clip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: border-color 0.2s, transform 0.15s;
    cursor: default;
  }

  .clip-card:hover {
    border-color: rgba(0,229,255,0.2);
    transform: translateY(-1px);
  }

  .clip-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 12px;
  }

  .clip-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .clip-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .clip-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--purple);
    background: rgba(179,136,255,0.08);
    padding: 2px 8px;
    border-radius: 5px;
  }

  .clip-dur {
    font-size: 11px;
    color: var(--muted);
  }

  .score-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .score-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--cyan);
    line-height: 1;
  }

  .score-grade {
    font-size: 11px;
    font-weight: 600;
  }

  .score-breakdown {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .score-pill {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
  }

  .pill-hook { background: rgba(255,109,109,0.12); color: #FF6D6D; }
  .pill-flow { background: rgba(0,229,255,0.1); color: var(--cyan); }
  .pill-value { background: rgba(105,255,156,0.1); color: var(--green); }
  .pill-trend { background: rgba(255,215,64,0.1); color: #FFD740; }

  .clip-preview {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 14px;
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }

  .clip-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-download {
    background: rgba(105,255,156,0.08);
    border: 1px solid rgba(105,255,156,0.2);
    border-radius: 8px;
    color: var(--green);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    text-decoration: none;
    transition: background 0.2s;
    display: inline-block;
  }

  .btn-download:hover { background: rgba(105,255,156,0.15); }

  .clip-size {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .error-card {
    background: rgba(255,109,109,0.06);
    border: 1px solid rgba(255,109,109,0.2);
    border-radius: 12px;
    padding: 20px;
    color: #FF6D6D;
    font-size: 13px;
    display: none;
    margin: 16px 0;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  footer {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <span class="logo-text">AutoClipAI</span>
    </div>
    <p class="tagline">Cole o link do vídeo — a IA encontra e corta os melhores momentos automaticamente</p>
  </div>
</header>

<div class="container">

  <!-- Input Card -->
  <div class="card">
    <div class="card-title">🔗 URL do Vídeo</div>
    <div class="url-row">
      <input type="text" id="url-input"
        placeholder="https://www.youtube.com/watch?v=..." />
      <button class="btn-primary" id="btn-process" onclick="startProcessing()">
        ▶ Processar
      </button>
    </div>

    <div class="divider"></div>

    <div class="card-title" style="margin-top:16px; color: var(--purple);">⚙️ Configurações</div>
    <div class="settings-grid">
      <div class="field">
        <label>Nº de clipes</label>
        <input type="number" id="num-clips" value="5" min="1" max="20" />
      </div>
      <div class="field">
        <label>Duração alvo (seg)</label>
        <input type="number" id="clip-duration" value="60" min="15" max="180" />
      </div>
      <div class="field">
        <label>Score mínimo</label>
        <input type="number" id="min-score" value="30" min="0" max="100" />
      </div>
      <div class="field">
        <label>Aspect ratio</label>
        <select id="aspect">
          <option value="16:9">16:9 — YouTube</option>
          <option value="9:16">9:16 — Reels/TikTok</option>
          <option value="1:1">1:1 — Instagram</option>
        </select>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="captions" checked />
      <label for="captions">Gerar legendas automáticas nos clipes</label>
    </div>
  </div>

  <!-- Error -->
  <div class="error-card" id="error-card"></div>

  <!-- Progress -->
  <div id="progress-area">
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-msg" id="progress-msg">Iniciando...</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="stage-dots">
        <span class="stage-dot" id="dot-download">⬇️ Download</span>
        <span class="stage-dot" id="dot-transcribe">🎙️ Transcrição</span>
        <span class="stage-dot" id="dot-analyze">🧠 Análise</span>
        <span class="stage-dot" id="dot-score">📈 Score</span>
        <span class="stage-dot" id="dot-render">⚡ Render</span>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div id="results-area">
    <div class="results-header" id="results-title">✅ Clipes Gerados</div>
    <div class="clips-grid" id="clips-grid"></div>
  </div>

</div>

<footer>AutoClipAI • Pipeline de IA para criadores de conteúdo</footer>

<script>
let pollInterval = null;
let currentJob = null;

const stages = ["download", "transcribe", "analyze", "score", "render"];

function startProcessing() {
  const url = document.getElementById("url-input").value.trim();
  if (!url) { showError("Cole a URL do vídeo antes de processar!"); return; }
  if (!url.startsWith("http")) { showError("URL inválida. Use um link de YouTube, Vimeo, etc."); return; }

  hideError();
  document.getElementById("btn-process").disabled = true;
  document.getElementById("results-area").style.display = "none";
  document.getElementById("progress-area").style.display = "block";
  stages.forEach(s => setDot(s, ""));

  const payload = {
    url,
    num_clips: parseInt(document.getElementById("num-clips").value),
    clip_duration: parseInt(document.getElementById("clip-duration").value),
    min_score: parseInt(document.getElementById("min-score").value),
    aspect: document.getElementById("aspect").value,
    captions: document.getElementById("captions").checked,
  };

  fetch("/process", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { showError(data.error); return; }
    currentJob = data.job_id;
    pollInterval = setInterval(pollStatus, 1500);
  })
  .catch(e => showError("Erro ao conectar com o servidor."));
}

function pollStatus() {
  if (!currentJob) return;
  fetch("/status/" + currentJob)
    .then(r => r.json())
    .then(job => {
      updateProgress(job);
      if (job.status === "done") {
        clearInterval(pollInterval);
        renderClips(job.clips);
      } else if (job.status === "error") {
        clearInterval(pollInterval);
        showError(job.message);
        document.getElementById("progress-area").style.display = "none";
        document.getElementById("btn-process").disabled = false;
      }
    });
}

function updateProgress(job) {
  document.getElementById("progress-msg").textContent = job.message || "Processando...";
  document.getElementById("progress-pct").textContent = (job.progress || 0) + "%";
  document.getElementById("progress-fill").style.width = (job.progress || 0) + "%";

  const stage = job.stage;
  stages.forEach(s => {
    const idx = stages.indexOf(s);
    const cur = stages.indexOf(stage);
    if (idx < cur) setDot(s, "done");
    else if (idx === cur) setDot(s, "active");
    else setDot(s, "");
  });
}

function setDot(stage, cls) {
  const el = document.getElementById("dot-" + stage);
  if (!el) return;
  el.className = "stage-dot" + (cls ? " " + cls : "");
}

function renderClips(clips) {
  document.getElementById("progress-area").style.display = "none";
  document.getElementById("btn-process").disabled = false;

  if (!clips || clips.length === 0) {
    showError("Nenhum clipe gerado. Tente reduzir o Score Mínimo ou aumentar a Duração Alvo.");
    return;
  }

  document.getElementById("results-title").textContent = `✅ ${clips.length} Clipe${clips.length > 1 ? "s" : ""} Gerado${clips.length > 1 ? "s" : ""}`;
  const grid = document.getElementById("clips-grid");
  grid.innerHTML = "";

  clips.forEach((clip, i) => {
    const gradeColor = clip.score >= 75 ? "#FF6D6D" : clip.score >= 55 ? "#FF9F40" : clip.score >= 35 ? "#69FF9C" : "#aaa";
    grid.innerHTML += `
      <div class="clip-card">
        <div class="clip-top">
          <div>
            <div class="clip-meta">
              <span class="clip-num">CLIPE #${i+1}</span>
              <span class="clip-time">${fmtTime(clip.start)} → ${fmtTime(clip.end)}</span>
              <span class="clip-dur">${clip.duration}s</span>
            </div>
          </div>
          <div class="score-badge">
            <span class="score-num">${clip.score}</span>
            <span class="score-grade" style="color:${gradeColor}">${clip.grade}</span>
          </div>
        </div>
        <div class="score-breakdown">
          <span class="score-pill pill-hook">🪝 Hook ${clip.hook}/25</span>
          <span class="score-pill pill-flow">🌊 Flow ${clip.flow}/25</span>
          <span class="score-pill pill-value">💎 Value ${clip.value}/25</span>
          <span class="score-pill pill-trend">📈 Trend ${clip.trend}/25</span>
        </div>
        <div class="clip-preview">"${clip.preview_text}"</div>
        <div class="clip-actions">
          <a href="${clip.url}" download class="btn-download">⬇️ Baixar MP4</a>
          ${clip.size_mb > 0 ? `<span class="clip-size">${clip.size_mb} MB</span>` : ""}
        </div>
      </div>`;
  });

  document.getElementById("results-area").style.display = "block";
  document.getElementById("results-area").scrollIntoView({ behavior: "smooth" });
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function showError(msg) {
  const el = document.getElementById("error-card");
  el.textContent = msg;
  el.style.display = "block";
}

function hideError() {
  document.getElementById("error-card").style.display = "none";
}
</script>

</body>
</html>
